<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Moonlight Flame</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a84c;--gold-light:#e8d5a3;
  --dark:#0d0d0d;--dark2:#1a1a1a;--dark3:#242424;
  --cream:#f5f0e8;--cream2:#ede5d8;
  --red:#b91c1c;
  --text-light:#d4c9b8;--text-muted:#8a7f72;
}
body{font-family:'Jost',sans-serif;background:var(--dark);color:var(--cream);min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--dark2)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(13,13,13,0.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,0.2);padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:70px}
.nav-logo{display:flex;align-items:center;gap:14px}
.nav-logo-text{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:2px;color:var(--gold);text-transform:uppercase}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--text-light);transition:color 0.3s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}

/* PAGE */
.page-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 20px;position:relative;overflow:hidden}
.page-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(201,168,76,0.06) 0%,transparent 60%),radial-gradient(ellipse at 70% 70%,rgba(185,28,28,0.04) 0%,transparent 50%)}

/* CARD */
.auth-card{background:var(--dark2);border:1px solid rgba(201,168,76,0.18);border-radius:6px;width:100%;max-width:420px;padding:48px 40px;position:relative;animation:fadeUp 0.5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.auth-card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60px;height:2px;background:var(--gold)}

.auth-eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:10px}
.auth-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;text-align:center;margin-bottom:6px;line-height:1.1}
.auth-title em{color:var(--gold);font-style:italic}
.auth-sub{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:36px;line-height:1.6}

.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
.form-group label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted)}
.form-group input{background:var(--dark3);border:1px solid rgba(201,168,76,0.2);color:var(--cream);padding:12px 16px;border-radius:2px;font-family:'Jost',sans-serif;font-size:14px;outline:none;transition:border-color 0.2s}
.form-group input:focus{border-color:var(--gold)}
.form-group input::placeholder{color:var(--text-muted)}

.forgot{text-align:right;margin-top:-10px;margin-bottom:18px}
.forgot a{font-size:12px;color:var(--text-muted);letter-spacing:0.5px;transition:color 0.2s}
.forgot a:hover{color:var(--gold)}

.submit-btn{width:100%;background:var(--gold);color:var(--dark);border:none;padding:15px;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:2px;font-weight:500;transition:all 0.3s;margin-top:4px}
.submit-btn:hover{background:var(--gold-light);transform:translateY(-1px)}

.divider{display:flex;align-items:center;gap:12px;margin:24px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(201,168,76,0.12)}
.divider span{font-size:11px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase}

.switch-link{text-align:center;font-size:13px;color:var(--text-muted)}
.switch-link a{color:var(--gold);transition:color 0.2s}
.switch-link a:hover{color:var(--gold-light)}

.decorative{position:absolute;font-size:80px;opacity:0.04;pointer-events:none;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--gold)}
.decorative.top-right{top:40px;right:30px}
.decorative.bottom-left{bottom:40px;left:30px}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark3);border:1px solid rgba(201,168,76,0.4);color:var(--cream);padding:13px 26px;border-radius:2px;font-size:13px;z-index:9999;transition:transform 0.4s;display:flex;align-items:center;gap:10px;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast-icon{color:var(--gold)}

@media(max-width:520px){nav{padding:0 20px}.nav-links{display:none}.auth-card{padding:36px 24px}}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <span class="nav-logo-text">Moonlight Flame</span>
  </div>
  <ul class="nav-links">
    <li><a href="{% url 'products' %}">Home</a></li>
    <li><a href="{% url 'orders' %}">Orders</a></li>
    <li><a href="{% url 'login' %}" class="active">Login</a></li>
    <li><a href="{% url 'register' %}">Register</a></li>
</ul>
</nav>

<div class="page-wrap">
  <div class="auth-card">
    <div class="decorative top-right">✦</div>
    <div class="decorative bottom-left">✦</div>

    <p class="auth-eyebrow">Welcome back</p>
    <h1 class="auth-title">Sign <em>In</em></h1>
    <p class="auth-sub">Enter your credentials to access your account and orders.</p>
{% if messages %}
    {% for message in messages %}
        <p style="color:red; text-align:center;">
            {{ message }}
        </p>
    {% endfor %}
{% endif %}
    <form method="POST">
    {% csrf_token %}

    <div class="form-group">
        <label for="username">Username</label>
        <input type="text"
               id="username"
               name="username"
               placeholder="Your username"
               required>
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password"
               id="password"
               name="password"
               placeholder="••••••••"
               required>
    </div>

    <button type="submit" class="submit-btn">
        Sign In ✦
    </button>
</form>

    <div class="divider"><span>or</span></div>

    <p class="switch-link">Don't have an account? <a href="{% url 'register' %}">Create one</a>
  </div>
</div>

<div class="toast" id="toast"><span class="toast-icon">✦</span><span id="toastMsg"></span></div>

<script>
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}


</script>
</body>
</html>
